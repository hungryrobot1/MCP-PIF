services:
  neo4j:
    image: neo4j:5-community
    container_name: mcp-pif-neo4j
    ports:
      - "7474:7474"  # Web interface
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4JLABS_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mcp-pif-network

  ml-service:
    build:
      context: ./ml_module
      dockerfile: Dockerfile
    container_name: mcp-pif-ml
    ports:
      - "8002:8002"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - PYTHONUNBUFFERED=1
      - ML_DEBUG=false
      - HOST=0.0.0.0
      - PORT=8002
      - VIRTUAL_ENV=/app/venv
      - PATH=/app/venv/bin:$PATH
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/venv/bin/python", "-c", "import requests; requests.get('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./ml_module:/app
      - ml_venv:/app/venv
      - /app/venv/bin
    networks:
      - mcp-pif-network
    restart: unless-stopped

  ml-service-test:
    build:
      context: ./ml_module
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    container_name: mcp-pif-ml-test
    environment:
      - NEO4J_URI=bolt://neo4j-test:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - PYTHONUNBUFFERED=1
      - VIRTUAL_ENV=/app/venv
      - PATH=/app/venv/bin:$PATH
    depends_on:
      neo4j-test:
        condition: service_healthy
    volumes:
      - ./ml_module:/app
      - ml_test_venv:/app/venv
      - /app/venv/bin
    networks:
      - mcp-pif-network
    command: ["/app/venv/bin/pytest", "-v", "--cov=core", "--cov=server", "--cov-report=term", "--cov-report=html:/app/coverage"]
    profiles:
      - test

  neo4j-test:
    image: neo4j:5-community
    container_name: mcp-pif-neo4j-test
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_pagecache_size=256M
      - NEO4J_dbms_memory_heap_initial__size=256M
      - NEO4J_dbms_memory_heap_max__size=512M
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mcp-pif-network
    profiles:
      - test

networks:
  mcp-pif-network:
    driver: bridge

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  ml_venv:
    driver: local
  ml_test_venv:
    driver: local
